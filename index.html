<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesan - MI Perfume</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .text-gold { color: #a38d58; }
        .bg-gold { background-color: #a38d58; }
        .bg-gold-light { background-color: #fbf9f2; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 pb-10">

    <header class="bg-white p-4 shadow-sm sticky top-0 z-10 flex flex-col items-center border-b border-gray-200">
        <img src="logo.jpeg" alt="MI Perfume" class="h-14 w-auto object-contain mb-1">
        <h1 class="text-sm font-bold text-gray-500">Form Pemesanan Online</h1>
    </header>

    <div class="p-4 max-w-md mx-auto mt-4">
        <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-[#a38d58]">
            <form id="form-pesan" onsubmit="kirimPesanan(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1">Nama Anda</label>
                    <input type="text" id="nama" required class="w-full border p-2 rounded focus:ring-[#a38d58]" placeholder="Masukkan nama">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1">Aroma Parfum</label>
                    <input type="text" id="aroma" required class="w-full border p-2 rounded focus:ring-[#a38d58]" placeholder="Misal: Bvlgari Aqua, Vanilla...">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1">Kelas Parfum</label>
                    <select id="kelas" required onchange="hitungTotal()" class="w-full border p-2 rounded focus:ring-[#a38d58]">
                        <option value="" disabled selected>Pilih Kelas...</option>
                        <option value="Standar">Standar (Rp 1.000/ml)</option>
                        <option value="Premium">Premium (Rp 2.000/ml)</option>
                        <option value="Super Premium">Super Premium (Rp 3.000/ml)</option>
                        <option value="Diamond">Diamond (Rp 4.000/ml)</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1">Ukuran Botol</label>
                    <div class="grid grid-cols-3 gap-2">
                        <label class="border rounded p-2 text-center cursor-pointer">
                            <input type="radio" name="ukuran" value="35" required onchange="hitungTotal()" class="hidden peer">
                            <span class="peer-checked:font-bold peer-checked:text-gold">35 ml</span>
                        </label>
                        <label class="border rounded p-2 text-center cursor-pointer">
                            <input type="radio" name="ukuran" value="50" onchange="hitungTotal()" class="hidden peer">
                            <span class="peer-checked:font-bold peer-checked:text-gold">50 ml</span>
                        </label>
                        <label class="border rounded p-2 text-center cursor-pointer">
                            <input type="radio" name="ukuran" value="100" onchange="hitungTotal()" class="hidden peer">
                            <span class="peer-checked:font-bold peer-checked:text-gold">100 ml</span>
                        </label>
                    </div>
                </div>

                <div class="mb-6 bg-gold-light p-4 rounded border border-[#e8dfc8]">
                    <span class="block text-sm">Total Harga:</span>
                    <span id="total-harga" class="text-2xl font-bold text-gold">Rp 0</span>
                </div>

                <button id="btn-submit" type="submit" class="w-full bg-gold text-white font-bold py-3 rounded shadow hover:opacity-90">
                    Kirim Pesanan Sekarang
                </button>
                <button onclick="testKoneksi(event)" class="mt-4 w-full bg-red-600 text-white font-bold py-3 rounded shadow">
    🔌 TEST KONEKSI DATABASE
</button>

<script>
    // Pastikan kode firebaseConfig Anda ada di atas ini
    // ...

    // Fungsi Test Koneksi
    function testKoneksi(event) {
        event.preventDefault(); // Mencegah form reload
        alert("Mencoba mengirim data test ke server...");
        
        db.collection("test_sistem").add({
            pesan: "Halo Admin! Koneksi aplikasi sukses!",
            waktu: new Date()
        })
        .then(() => {
            alert("✅ SUKSES! Aplikasi sudah terhubung dengan Firestore!");
        })
        .catch((error) => {
            alert("❌ GAGAL! Ada masalah koneksi: " + error.message);
        });
    }
</script>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
  apiKey: "AIzaSyDlrX84TqRgJS902PdjH8awCQacO6hzStY",
  authDomain: "mi-perfume-1989.firebaseapp.com",
  databaseURL: "https://mi-perfume-1989-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mi-perfume-1989",
  storageBucket: "mi-perfume-1989.firebasestorage.app",
  messagingSenderId: "894897183896",
  appId: "1:894897183896:web:71372dc8cbb9056c7144ed",
  measurementId: "G-H2KG1X9KVN"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

        const hargaPerMl = { "Standar": 1000, "Premium": 2000, "Super Premium": 3000, "Diamond": 4000 };

        function hitungTotal() {
            const kelas = document.getElementById('kelas').value;
            const ukuranEl = document.querySelector('input[name="ukuran"]:checked');
            if (kelas && ukuranEl) {
                const total = hargaPerMl[kelas] * parseInt(ukuranEl.value);
                document.getElementById('total-harga').innerText = 'Rp ' + total.toLocaleString('id-ID');
                return total;
            }
            return 0;
        }

        function kirimPesanan(event) {
            event.preventDefault();
            const btn = document.getElementById('btn-submit');
            btn.innerText = "Mengirim...";
            btn.disabled = true;

            const pesananBaru = {
                nama: document.getElementById('nama').value,
                aroma: document.getElementById('aroma').value,
                kelas: document.getElementById('kelas').value,
                ukuran: document.querySelector('input[name="ukuran"]:checked').value,
                total: hitungTotal(),
                status: "Menunggu Diproses", // Status pesanan
                waktu: firebase.firestore.FieldValue.serverTimestamp() // Waktu dari server Google
            };

            // Mengirim data ke koleksi "pesanan" di database
            db.collection("pesanan").add(pesananBaru)
            .then(() => {
                alert("Pesanan berhasil dikirim! Admin kami akan segera memprosesnya.");
                document.getElementById('form-pesan').reset();
                document.getElementById('total-harga').innerText = 'Rp 0';
                btn.innerText = "Kirim Pesanan Sekarang";
                btn.disabled = false;
            })
            .catch((error) => {
                alert("Terjadi kesalahan: " + error.message);
                btn.innerText = "Kirim Pesanan Sekarang";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
