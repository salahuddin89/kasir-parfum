<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="MI Perfume">
    <title>MI Perfume</title>
    
    <link rel="apple-touch-icon" href="logo.jpg">
    <link rel="icon" type="image/jpeg" href="logo.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        /* Warna aksen emas menyesuaikan logo */
        .tab-active { border-bottom: 2px solid #a38d58; color: #a38d58; font-weight: bold; }
        .btn-gold { background-color: #a38d58; color: white; }
        .btn-gold:hover { background-color: #8c7847; }
        .text-gold { color: #a38d58; }
        .bg-gold-light { background-color: #fbf9f2; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 pb-20">

    <header class="bg-white p-4 shadow-sm sticky top-0 z-10 flex flex-col items-center border-b border-gray-200">
        <img src="logo.jpg" alt="Logo MI Perfume" class="h-14 w-auto object-contain mb-1">
    </header>

    <div class="flex bg-white shadow-sm mb-4">
        <button id="tab-kasir" class="flex-1 py-3 text-center tab-active" onclick="switchTab('kasir')">Kasir</button>
        <button id="tab-laporan" class="flex-1 py-3 text-center text-gray-500" onclick="switchTab('laporan')">Laporan & Grafik</button>
    </div>

    <div id="page-kasir" class="p-4 max-w-md mx-auto">
        <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-[#a38d58]">
            <h2 class="text-lg font-bold mb-4 border-b pb-2 text-gray-700">Transaksi Baru</h2>
            
            <form id="form-kasir" onsubmit="simpanTransaksi(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nama Pembeli</label>
                    <input type="text" id="nama" required class="w-full border border-gray-300 rounded-lg p-2 focus:ring-[#a38d58] focus:border-[#a38d58]" placeholder="Masukkan nama pelanggan">
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nama Aroma</label>
                    <input type="text" id="aroma" required class="w-full border border-gray-300 rounded-lg p-2 focus:ring-[#a38d58] focus:border-[#a38d58]" placeholder="Misal: Bvlgari Aqua, Vanilla...">
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Kelas Parfum</label>
                    <select id="kelas" required onchange="hitungTotal()" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-[#a38d58] focus:border-[#a38d58]">
                        <option value="" disabled selected>Pilih Kelas...</option>
                        <option value="Standar">Standar (Rp 1.000/ml)</option>
                        <option value="Premium">Premium (Rp 2.000/ml)</option>
                        <option value="Super Premium">Super Premium (Rp 3.000/ml)</option>
                        <option value="Diamond">Diamond (Rp 4.000/ml)</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Ukuran Botol</label>
                    <div class="grid grid-cols-3 gap-2">
                        <label class="border border-gray-300 rounded-lg p-2 text-center cursor-pointer hover:bg-gray-50">
                            <input type="radio" name="ukuran" value="35" required onchange="hitungTotal()" class="hidden peer">
                            <span class="peer-checked:font-bold peer-checked:text-gold">35 ml</span>
                        </label>
                        <label class="border border-gray-300 rounded-lg p-2 text-center cursor-pointer hover:bg-gray-50">
                            <input type="radio" name="ukuran" value="50" onchange="hitungTotal()" class="hidden peer">
                            <span class="peer-checked:font-bold peer-checked:text-gold">50 ml</span>
                        </label>
                        <label class="border border-gray-300 rounded-lg p-2 text-center cursor-pointer hover:bg-gray-50">
                            <input type="radio" name="ukuran" value="100" onchange="hitungTotal()" class="hidden peer">
                            <span class="peer-checked:font-bold peer-checked:text-gold">100 ml</span>
                        </label>
                    </div>
                </div>

                <div class="mb-6 bg-gold-light p-4 rounded-lg border border-[#e8dfc8]">
                    <span class="block text-sm text-gray-600">Total Harga:</span>
                    <span id="total-harga" class="text-2xl font-bold text-gold">Rp 0</span>
                </div>

                <button type="submit" class="w-full btn-gold font-bold py-3 rounded-lg shadow active:scale-95 transition-transform">
                    Simpan Transaksi
                </button>
            </form>
        </div>
    </div>

    <div id="page-laporan" class="p-4 max-w-md mx-auto hidden">
        <div class="bg-white p-4 rounded-xl shadow-md mb-4 border-t-4 border-[#a38d58]">
            <h2 class="text-lg font-bold mb-2">Grafik Pendapatan</h2>
            <canvas id="grafikPenjualan" width="400" height="250"></canvas>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-md border-t-4 border-[#a38d58]">
            <h2 class="text-lg font-bold mb-2 border-b pb-2">Riwayat Pembukuan</h2>
            <div id="daftar-transaksi" class="space-y-3 mt-3 max-h-80 overflow-y-auto">
                </div>
        </div>
    </div>

    <script>
        const hargaPerMl = {
            "Standar": 1000,
            "Premium": 2000,
            "Super Premium": 3000,
            "Diamond": 4000
        };

        let chartInstance = null;

        const formatRupiah = (angka) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
        };

        function switchTab(tabId) {
            document.getElementById('page-kasir').classList.add('hidden');
            document.getElementById('page-laporan').classList.add('hidden');
            document.getElementById('tab-kasir').classList.remove('tab-active', 'text-gray-500');
            document.getElementById('tab-laporan').classList.remove('tab-active', 'text-gray-500');

            if(tabId === 'kasir') {
                document.getElementById('page-kasir').classList.remove('hidden');
                document.getElementById('tab-kasir').classList.add('tab-active');
                document.getElementById('tab-laporan').classList.add('text-gray-500');
            } else {
                document.getElementById('page-laporan').classList.remove('hidden');
                document.getElementById('tab-laporan').classList.add('tab-active');
                document.getElementById('tab-kasir').classList.add('text-gray-500');
                renderLaporan();
            }
        }

        function hitungTotal() {
            const kelas = document.getElementById('kelas').value;
            const ukuranEl = document.querySelector('input[name="ukuran"]:checked');
            
            if (kelas && ukuranEl) {
                const ukuran = parseInt(ukuranEl.value);
                const total = hargaPerMl[kelas] * ukuran;
                document.getElementById('total-harga').innerText = formatRupiah(total);
                return total;
            }
            return 0;
        }

        function simpanTransaksi(event) {
            event.preventDefault();

            const nama = document.getElementById('nama').value;
            const aroma = document.getElementById('aroma').value;
            const kelas = document.getElementById('kelas').value;
            const ukuran = document.querySelector('input[name="ukuran"]:checked').value;
            const total = hitungTotal();
            const tanggal = new Date().toISOString();

            const transaksiBaru = { id: Date.now(), nama, aroma, kelas, ukuran, total, tanggal };

            let dataPenjualan = JSON.parse(localStorage.getItem('parfum_db')) || [];
            dataPenjualan.push(transaksiBaru);
            localStorage.setItem('parfum_db', JSON.stringify(dataPenjualan));

            alert(`Transaksi berhasil!\nNama: ${nama}\nAroma: ${aroma}\nTotal: ${formatRupiah(total)}`);
            document.getElementById('form-kasir').reset();
            document.getElementById('total-harga').innerText = 'Rp 0';
        }

        function renderLaporan() {
            const dataPenjualan = JSON.parse(localStorage.getItem('parfum_db')) || [];
            const containerRiwayat = document.getElementById('daftar-transaksi');
            containerRiwayat.innerHTML = '';

            if (dataPenjualan.length === 0) {
                containerRiwayat.innerHTML = '<p class="text-sm text-gray-500 italic">Belum ada transaksi.</p>';
            }

            const dataGrafik = {};

            dataPenjualan.slice().reverse().forEach(trx => {
                const dateObj = new Date(trx.tanggal);
                const tanggalFormat = dateObj.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
                const bulanTahun = dateObj.toLocaleDateString('id-ID', { month: 'short', year: 'numeric' });

                if (!dataGrafik[bulanTahun]) dataGrafik[bulanTahun] = 0;
                dataGrafik[bulanTahun] += trx.total;

                const namaAromaTampil = trx.aroma ? trx.aroma : '-';

                const item = document.createElement('div');
                item.className = 'border-b pb-2 flex justify-between items-start';
                item.innerHTML = `
                    <div>
                        <p class="font-bold text-sm text-gray-800">${trx.nama}</p>
                        <p class="text-xs text-gold font-medium">Aroma: ${namaAromaTampil}</p>
                        <p class="text-xs text-gray-500">${trx.kelas} - ${trx.ukuran}ml | ${tanggalFormat}</p>
                    </div>
                    <div class="font-bold text-green-600 text-sm">
                        ${formatRupiah(trx.total)}
                    </div>
                `;
                containerRiwayat.appendChild(item);
            });

            renderGrafik(dataGrafik);
        }

        function renderGrafik(dataGrafik) {
            const ctx = document.getElementById('grafikPenjualan').getContext('2d');
            const labelBulan = Object.keys(dataGrafik).reverse();
            const dataPendapatan = Object.values(dataGrafik).reverse();

            if (chartInstance) {
                chartInstance.destroy();
            }

            // Mengubah warna bar grafik menjadi emas
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labelBulan.length > 0 ? labelBulan : ['Belum ada data'],
                    datasets: [{
                        label: 'Total Pendapatan (Rp)',
                        data: dataPendapatan.length > 0 ? dataPendapatan : [0],
                        backgroundColor: '#a38d58', 
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }
    </script>
</body>
</html>
