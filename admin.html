<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - MI Perfume</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        .tab-active { border-bottom: 3px solid #a38d58; color: #a38d58; font-weight: bold; }
        .text-gold { color: #a38d58; }
        .bg-gold { background-color: #a38d58; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 pb-20">

    <div id="login-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-gray-100 px-4">
        <div class="bg-white p-8 rounded-xl shadow-lg max-w-sm w-full border-t-4 border-[#a38d58]">
            <div class="flex justify-center mb-4">
                <h1 class="text-2xl font-bold text-[#a38d58]">MI Perfume</h1>
            </div>
            <h2 class="text-center text-gray-600 mb-6 font-medium">Login Admin Area</h2>
            
            <form id="form-login" onsubmit="prosesLogin(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1 text-gray-700">Username</label>
                    <input type="text" id="input-user" required class="w-full border p-3 rounded-lg focus:ring-[#a38d58] outline-none" placeholder="Masukkan username">
                </div>
                
                <div class="mb-6">
    <label class="block text-sm font-medium mb-1 text-gray-700">Password</label>
    <div class="relative flex items-center">
        <input type="password" id="input-pass" required class="w-full border p-3 rounded-lg focus:ring-[#a38d58] outline-none pr-14" placeholder="Masukkan password">
        <button type="button" onclick="togglePassword()" class="absolute right-0 h-full px-4 flex items-center justify-center text-xl text-gray-500 hover:text-gray-700 focus:outline-none z-10 cursor-pointer select-none">
            <span id="eye-icon">👁️</span>
        </button>
    </div>
</div>

                <button type="submit" class="w-full bg-gold text-white font-bold py-3 rounded-lg shadow hover:opacity-90 transition">
                    Masuk
                </button>
            </form>
        </div>
    </div>

    <div id="admin-content" class="hidden">
        
        <header class="bg-gray-800 text-white p-4 shadow-sm sticky top-0 z-20 flex justify-between items-center">
            <h1 class="text-lg font-bold text-[#a38d58]">MI Perfume - Admin</h1>
            <button onclick="logoutAdmin()" class="text-xs bg-red-500 hover:bg-red-600 px-3 py-1 rounded shadow">Logout</button>
        </header>

        <div class="flex bg-white shadow-sm mb-4 sticky top-[60px] z-10">
            <button id="tab-pesanan" class="flex-1 py-3 text-center tab-active text-sm" onclick="switchTab('pesanan')">Pesanan Masuk</button>
            <button id="tab-dashboard" class="flex-1 py-3 text-center text-gray-500 text-sm" onclick="switchTab('dashboard')">Dashboard Analitik</button>
        </div>

        <div id="page-pesanan" class="p-4 max-w-md mx-auto">
            <div id="daftar-pesanan" class="space-y-4">
                <p class="text-center text-gray-500 italic mt-10">Memuat data dari server...</p>
            </div>
        </div>

        <div id="page-dashboard" class="p-4 max-w-md mx-auto hidden">
            <h2 class="text-lg font-bold mb-3">Ringkasan Bulan Ini</h2>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-white p-4 rounded-xl shadow border-t-4 border-[#a38d58]">
                    <p class="text-xs text-gray-500 mb-1">Total Omset</p>
                    <p id="dash-omset" class="text-lg font-bold text-gold">Rp 0</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow border-t-4 border-[#a38d58]">
                    <p class="text-xs text-gray-500 mb-1">Botol Terjual</p>
                    <p id="dash-qty" class="text-2xl font-bold text-gray-800">0</p>
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow mb-6 border-t-4 border-[#a38d58]">
                <h2 class="text-sm font-bold mb-2 text-gray-700">Grafik Omset Bulanan</h2>
                <canvas id="grafikOmset" width="400" height="250"></canvas>
            </div>

            <div class="bg-white p-4 rounded-xl shadow mb-6 border-t-4 border-[#a38d58]">
                <h2 class="text-sm font-bold mb-3 text-gray-700">Top 20 Aroma Terlaris 🚀</h2>
                <div id="daftar-aroma" class="space-y-2 max-h-80 overflow-y-auto pr-2"></div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow mb-6 border-t-4 border-red-400">
                <h2 class="text-sm font-bold mb-3 text-red-600">20 Aroma Kurang Laris 🔻</h2>
                <p class="text-xs text-gray-500 mb-3 border-b pb-2">Aroma dengan penjualan paling sedikit (Underperforming).</p>
                <div id="daftar-aroma-bawah" class="space-y-2 max-h-80 overflow-y-auto pr-2"></div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. PENGATURAN USERNAME & PASSWORD ADMIN
        // ==========================================
        const USERNAME_ADMIN = "admin";
        const PASSWORD_ADMIN = "miperfume123";

        // Fitur Tampilkan/Sembunyikan Password
        function togglePassword() {
            const passInput = document.getElementById('input-pass');
            const eyeIcon = document.getElementById('eye-icon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.innerText = '🙈'; // Ubah ikon saat password terlihat
            } else {
                passInput.type = 'password';
                eyeIcon.innerText = '👁️'; // Ubah ikon kembali
            }
        }

        if (sessionStorage.getItem("admin_logged_in") === "true") {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('admin-content').classList.remove('hidden');
        }

        function prosesLogin(event) {
            event.preventDefault();
            
            // Perbaikan: .toLowerCase() agar tidak sensitif huruf besar/kecil (Admin vs admin)
            // Perbaikan: .trim() untuk membuang spasi yang tidak sengaja terketik di awal/akhir
            const user = document.getElementById('input-user').value.toLowerCase().trim();
            const pass = document.getElementById('input-pass').value.trim();

            if (user === USERNAME_ADMIN && pass === PASSWORD_ADMIN) {
                sessionStorage.setItem("admin_logged_in", "true");
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-content').classList.remove('hidden');
            } else {
                alert("❌ Username atau Password salah! Cek kembali ketikan Anda.");
            }
        }

        function logoutAdmin() {
            if(confirm("Yakin ingin keluar dari halaman admin?")) {
                sessionStorage.removeItem("admin_logged_in");
                document.getElementById('form-login').reset();
                // Kembalikan tipe input ke password jika tadi sempat di-show
                document.getElementById('input-pass').type = 'password';
                document.getElementById('eye-icon').innerText = '👁️';

                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('admin-content').classList.add('hidden');
            }
        }

        // ==========================================
        // 2. KONFIGURASI FIREBASE ANDA
        // ==========================================
        const firebaseConfig = {
  apiKey: "AIzaSyDlrX84TqRgJS902PdjH8awCQacO6hzStY",
  authDomain: "mi-perfume-1989.firebaseapp.com",
  databaseURL: "https://mi-perfume-1989-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mi-perfume-1989",
  storageBucket: "mi-perfume-1989.firebasestorage.app",
  messagingSenderId: "894897183896",
  appId: "1:894897183896:web:71372dc8cbb9056c7144ed",
  measurementId: "G-H2KG1X9KVN"
};
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let chartInstance = null;

        // --- Logika Ganti Tab ---
        function switchTab(tabId) {
            document.getElementById('page-pesanan').classList.add('hidden');
            document.getElementById('page-dashboard').classList.add('hidden');
            document.getElementById('tab-pesanan').classList.remove('tab-active', 'text-gray-500');
            document.getElementById('tab-dashboard').classList.remove('tab-active', 'text-gray-500');

            if(tabId === 'pesanan') {
                document.getElementById('page-pesanan').classList.remove('hidden');
                document.getElementById('tab-pesanan').classList.add('tab-active');
                document.getElementById('tab-dashboard').classList.add('text-gray-500');
            } else {
                document.getElementById('page-dashboard').classList.remove('hidden');
                document.getElementById('tab-dashboard').classList.add('tab-active');
                document.getElementById('tab-pesanan').classList.add('text-gray-500');
            }
        }

        // --- Mengambil Data Real-time & Memproses Dashboard ---
        db.collection("pesanan").orderBy("waktu", "desc").onSnapshot((snapshot) => {
            const containerPesanan = document.getElementById('daftar-pesanan');
            containerPesanan.innerHTML = ''; 

            if (snapshot.empty) {
                containerPesanan.innerHTML = '<p class="text-center text-gray-500 italic">Belum ada pesanan masuk.</p>';
                return;
            }

            let totalOmsetBulanIni = 0;
            let totalQtyBulanIni = 0;
            const rekapBulanan = {}; 
            const rekapAroma = {};   

            const bulanSekarang = new Date().toLocaleDateString('id-ID', { month: 'short', year: 'numeric' });

            snapshot.forEach((doc) => {
                const data = doc.data();
                const id = doc.id; 

                // Render Kartu Pesanan
                let statusColor = "bg-yellow-100 text-yellow-700";
                if (data.status === "Selesai") statusColor = "bg-green-100 text-green-700";
                if (data.status === "Ditolak") statusColor = "bg-red-100 text-red-700";

                let actionButtons = '';
                if (data.status !== "Selesai" && data.status !== "Ditolak") {
                    actionButtons = `
                        <div class="flex gap-2 mt-4 border-t pt-3">
                            <button onclick="selesaikanPesanan('${id}')" class="flex-1 bg-gray-800 text-white text-sm py-2 rounded shadow hover:bg-gray-700 transition">Selesaikan</button>
                            <button onclick="tolakPesanan('${id}')" class="flex-1 bg-red-100 text-red-700 font-bold text-sm py-2 rounded shadow border border-red-200 hover:bg-red-200 transition">Tolak</button>
                        </div>
                    `;
                }

                let alasanPenolakan = '';
                if (data.status === "Ditolak" && data.alasan) {
                    alasanPenolakan = `<div class="mt-3 bg-red-50 p-2 rounded border border-red-100"><p class="text-xs text-red-600 font-bold">Alasan Ditolak:</p><p class="text-sm text-red-700 italic">${data.alasan}</p></div>`;
                }

                const card = document.createElement('div');
