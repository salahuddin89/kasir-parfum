<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - MI Perfume</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        .tab-active { border-bottom: 3px solid #a38d58; color: #a38d58; font-weight: bold; }
        .text-gold { color: #a38d58; }
        .bg-gold { background-color: #a38d58; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 pb-20">

    <header class="bg-gray-800 text-white p-4 shadow-sm sticky top-0 z-20 flex justify-between items-center">
        <h1 class="text-lg font-bold text-[#a38d58]">MI Perfume - Admin</h1>
        <span class="text-xs bg-green-500 px-2 py-1 rounded-full animate-pulse">Online</span>
    </header>

    <div class="flex bg-white shadow-sm mb-4 sticky top-[60px] z-10">
        <button id="tab-pesanan" class="flex-1 py-3 text-center tab-active text-sm" onclick="switchTab('pesanan')">Pesanan Masuk</button>
        <button id="tab-dashboard" class="flex-1 py-3 text-center text-gray-500 text-sm" onclick="switchTab('dashboard')">Dashboard Analitik</button>
    </div>

    <div id="page-pesanan" class="p-4 max-w-md mx-auto">
        <div id="daftar-pesanan" class="space-y-4">
            <p class="text-center text-gray-500 italic mt-10">Memuat data dari server...</p>
        </div>
    </div>

    <div id="page-dashboard" class="p-4 max-w-md mx-auto hidden">
        
        <h2 class="text-lg font-bold mb-3">Ringkasan Bulan Ini</h2>
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-white p-4 rounded-xl shadow border-t-4 border-[#a38d58]">
                <p class="text-xs text-gray-500 mb-1">Total Omset</p>
                <p id="dash-omset" class="text-lg font-bold text-gold">Rp 0</p>
            </div>
            <div class="bg-white p-4 rounded-xl shadow border-t-4 border-[#a38d58]">
                <p class="text-xs text-gray-500 mb-1">Botol Terjual</p>
                <p id="dash-qty" class="text-2xl font-bold text-gray-800">0</p>
            </div>
        </div>

        <div class="bg-white p-4 rounded-xl shadow mb-6 border-t-4 border-[#a38d58]">
            <h2 class="text-sm font-bold mb-2 text-gray-700">Grafik Omset Bulanan</h2>
            <canvas id="grafikOmset" width="400" height="250"></canvas>
        </div>

        <div class="bg-white p-4 rounded-xl shadow border-t-4 border-[#a38d58]">
            <h2 class="text-sm font-bold mb-3 text-gray-700">Top 20 Aroma Terlaris (All Time)</h2>
            <div id="daftar-aroma" class="space-y-2 max-h-80 overflow-y-auto pr-2">
                </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
  apiKey: "AIzaSyDlrX84TqRgJS902PdjH8awCQacO6hzStY",
  authDomain: "mi-perfume-1989.firebaseapp.com",
  databaseURL: "https://mi-perfume-1989-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mi-perfume-1989",
  storageBucket: "mi-perfume-1989.firebasestorage.app",
  messagingSenderId: "894897183896",
  appId: "1:894897183896:web:71372dc8cbb9056c7144ed",
  measurementId: "G-H2KG1X9KVN"
};
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let chartInstance = null;

        // --- Logika Ganti Tab ---
        function switchTab(tabId) {
            document.getElementById('page-pesanan').classList.add('hidden');
            document.getElementById('page-dashboard').classList.add('hidden');
            document.getElementById('tab-pesanan').classList.remove('tab-active', 'text-gray-500');
            document.getElementById('tab-dashboard').classList.remove('tab-active', 'text-gray-500');

            if(tabId === 'pesanan') {
                document.getElementById('page-pesanan').classList.remove('hidden');
                document.getElementById('tab-pesanan').classList.add('tab-active');
                document.getElementById('tab-dashboard').classList.add('text-gray-500');
            } else {
                document.getElementById('page-dashboard').classList.remove('hidden');
                document.getElementById('tab-dashboard').classList.add('tab-active');
                document.getElementById('tab-pesanan').classList.add('text-gray-500');
            }
        }

        // --- Mengambil Data Real-time & Memproses Dashboard ---
        db.collection("pesanan").orderBy("waktu", "desc").onSnapshot((snapshot) => {
            const containerPesanan = document.getElementById('daftar-pesanan');
            containerPesanan.innerHTML = ''; 

            if (snapshot.empty) {
                containerPesanan.innerHTML = '<p class="text-center text-gray-500 italic">Belum ada pesanan masuk.</p>';
                return;
            }

            // Variabel untuk Dashboard
            let totalOmsetBulanIni = 0;
            let totalQtyBulanIni = 0;
            const rekapBulanan = {}; // Untuk Grafik: { "Jan 2024": 500000, "Feb 2024": 700000 }
            const rekapAroma = {};   // Untuk Top 20: { "Bvlgari Aqua": 15, "Vanilla": 10 }

            const bulanSekarang = new Date().toLocaleDateString('id-ID', { month: 'short', year: 'numeric' });

            snapshot.forEach((doc) => {
                const data = doc.data();
                const id = doc.id; 

                // 1. RENDER KARTU PESANAN (TAB 1)
                let statusColor = "bg-yellow-100 text-yellow-700";
                if (data.status === "Selesai") statusColor = "bg-green-100 text-green-700";
                if (data.status === "Ditolak") statusColor = "bg-red-100 text-red-700";

                let actionButtons = '';
                if (data.status !== "Selesai" && data.status !== "Ditolak") {
                    actionButtons = `
                        <div class="flex gap-2 mt-4 border-t pt-3">
                            <button onclick="selesaikanPesanan('${id}')" class="flex-1 bg-gray-800 text-white text-sm py-2 rounded shadow hover:bg-gray-700 transition">Selesaikan</button>
                            <button onclick="tolakPesanan('${id}')" class="flex-1 bg-red-100 text-red-700 font-bold text-sm py-2 rounded shadow border border-red-200 hover:bg-red-200 transition">Tolak</button>
                        </div>
                    `;
                }

                let alasanPenolakan = '';
                if (data.status === "Ditolak" && data.alasan) {
                    alasanPenolakan = `<div class="mt-3 bg-red-50 p-2 rounded border border-red-100"><p class="text-xs text-red-600 font-bold">Alasan Ditolak:</p><p class="text-sm text-red-700 italic">${data.alasan}</p></div>`;
                }

                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-xl shadow border-l-4 border-[#a38d58]";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-bold text-lg">${data.nama}</h3>
                        <span class="text-xs font-bold px-2 py-1 rounded ${statusColor}">${data.status}</span>
                    </div>
                    <p class="text-sm text-gray-600"><span class="font-bold">Aroma:</span> ${data.aroma}</p>
                    <p class="text-sm text-gray-600"><span class="font-bold">Detail:</span> ${data.kelas} - ${data.ukuran}ml</p>
                    <p class="text-lg font-bold text-[#a38d58] mt-2">Rp ${data.total.toLocaleString('id-ID')}</p>
                    ${alasanPenolakan}
                    ${actionButtons}
                `;
                containerPesanan.appendChild(card);

                // 2. PROSES DATA DASHBOARD (Hanya hitung pesanan yang "Selesai")
                if (data.status === "Selesai") {
                    // Cek waktu (fallback ke waktu lokal jika server lambat merespon)
                    const waktuTanggal = data.waktu ? data.waktu.toDate() : new Date();
                    const bulanTransaksi = waktuTanggal.toLocaleDateString('id-ID', { month: 'short', year: 'numeric' });

                    // Hitung Bulan Ini
                    if (bulanTransaksi === bulanSekarang) {
                        totalOmsetBulanIni += data.total;
                        totalQtyBulanIni += 1;
                    }

                    // Rekap Grafik Bulanan
                    if (!rekapBulanan[bulanTransaksi]) rekapBulanan[bulanTransaksi] = 0;
                    rekapBulanan[bulanTransaksi] += data.total;

                    // Rekap Aroma (Ubah ke huruf kapital semua agar seragam, misal: "vanilla" = "VANILLA")
                    const namaAroma = data.aroma.trim().toUpperCase();
                    if (!rekapAroma[namaAroma]) rekapAroma[namaAroma] = 0;
                    rekapAroma[namaAroma] += 1; // Dihitung berdasarkan jumlah botol (pesanan)
                }
            });

            // 3. RENDER DASHBOARD (TAB 2)
            document.getElementById('dash-omset').innerText = 'Rp ' + totalOmsetBulanIni.toLocaleString('id-ID');
            document.getElementById('dash-qty').innerText = totalQtyBulanIni;

            renderGrafik(rekapBulanan);
            renderTopAroma(rekapAroma);
        });

        // --- Fungsi Grafik Menggunakan Chart.js ---
        function renderGrafik(dataBulanan) {
            const ctx = document.getElementById('grafikOmset').getContext('2d');
            
            // Membalik urutan agar bulan terlama di kiri, terbaru di kanan
            const labelBulan = Object.keys(dataBulanan).reverse();
            const dataOmset = Object.values(dataBulanan).reverse();

            if (chartInstance) {
                chartInstance.destroy(); // Hapus grafik lama sebelum update
            }

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labelBulan.length > 0 ? labelBulan : ['Belum ada data'],
                    datasets: [{
                        label: 'Omset (Rp)',
                        data: dataOmset.length > 0 ? dataOmset : [0],
                        backgroundColor: '#a38d58',
                        borderRadius: 4
                    }]
                },
                options: { responsive: true, scales: { y: { beginAtZero: true } } }
            });
        }

        // --- Fungsi Render Top 20 Aroma ---
        function renderTopAroma(dataAroma) {
            const containerAroma = document.getElementById('daftar-aroma');
            containerAroma.innerHTML = '';

            // Mengubah Object menjadi Array lalu diurutkan dari yang terbanyak
            const aromaSorted = Object.entries(dataAroma)
                .sort((a, b) => b[1] - a[1]) // Urutkan Descending
                .slice(0, 20);               // Ambil hanya 20 teratas

            if (aromaSorted.length === 0) {
                containerAroma.innerHTML = '<p class="text-sm text-gray-500 italic">Belum ada data penjualan selesai.</p>';
                return;
            }

            aromaSorted.forEach((item, index) => {
                const nama = item[0];
                const jumlah = item[1];
                
                // Beri medali untuk top 3
                let peringkat = `<span class="font-bold text-gray-500">${index + 1}.</span>`;
                if (index === 0) peringkat = '🥇';
                if (index === 1) peringkat = '🥈';
                if (index === 2) peringkat = '🥉';

                const div = document.createElement('div');
                div.className = 'flex justify-between items-center border-b pb-2';
                div.innerHTML = `
                    <div class="flex items-center gap-2">
                        <div class="w-6 text-center">${peringkat}</div>
                        <span class="font-medium text-sm text-gray-800">${nama}</span>
                    </div>
                    <span class="text-xs bg-gold text-white px-2 py-1 rounded-full">${jumlah} botol</span>
                `;
                containerAroma.appendChild(div);
            });
        }

        // --- Aksi Pesanan ---
        function selesaikanPesanan(id) {
            if(confirm("Apakah pesanan ini sudah selesai diproses?")) {
                db.collection("pesanan").doc(id).update({ status: "Selesai" })
                .catch((error) => alert("Error: " + error));
            }
        }

        function tolakPesanan(id) {
            const alasan = prompt("Masukkan alasan menolak pesanan ini:");
            if (alasan !== null && alasan.trim() !== "") {
                db.collection("pesanan").doc(id).update({ status: "Ditolak", alasan: alasan.trim() })
                .catch((error) => alert("Error: " + error));
            }
        }
    </script>
</body>
</html>
